{% extends "base.html" %}

{% block title %}Settings{% endblock %}

{% block content %}
<div class="card" style="max-width: 800px; margin: 0 auto;">
    <div class="flex items-center gap-2 mb-6">
        <i data-lucide="settings" style="color: var(--primary);"></i>
        <h2 style="margin: 0;">Configurazione</h2>
    </div>
    
    <form action="/settings" method="post">
        
        <div style="background: var(--bg-color); padding: 24px; border-radius: var(--radius-md); border: 1px solid var(--card-border); margin-bottom: 24px;">
            <div class="flex items-center gap-2 mb-4">
                <i data-lucide="cpu" style="color: var(--text-muted);"></i>
                <h3 style="margin: 0; font-size: 1.1rem;">App / Runtime</h3>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>APP_NAME</label>
                    <input type="text" name="APP_NAME" class="form-control mono" value="{{ settings.APP_NAME }}">
                </div>
                <div class="form-group">
                    <label>DEFAULT_AUTO_START_WINDOW_SECONDS</label>
                    <input type="number" name="DEFAULT_AUTO_START_WINDOW_SECONDS" class="form-control mono" value="{{ settings.DEFAULT_AUTO_START_WINDOW_SECONDS }}">
                </div>
            </div>
        </div>

        <div style="background: var(--bg-color); padding: 24px; border-radius: var(--radius-md); border: 1px solid var(--card-border); margin-bottom: 24px;">
            <div class="flex items-center gap-2 mb-4">
                <i data-lucide="server" style="color: var(--text-muted);"></i>
                <h3 style="margin: 0; font-size: 1.1rem;">Dynadot</h3>
            </div>
            <div class="checkbox-row" style="margin-bottom: 16px; padding: 12px; background: rgba(255,255,255,0.02); border-radius: var(--radius-sm); border: 1px solid var(--card-border);">
                <input type="checkbox" name="DYNADOT_ENABLED" id="dyn_enabled" {% if settings.DYNADOT_ENABLED %}checked{% endif %}>
                <label for="dyn_enabled" style="margin-bottom: 0; font-weight: 600;">Abilita Dynadot</label>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>API Key</label>
                    <input type="text" name="DYNADOT_API_KEY" class="form-control mono" value="{{ settings.DYNADOT_API_KEY }}">
                </div>
                <div class="form-group">
                    <label>API Secret</label>
                    <input type="password" name="DYNADOT_API_SECRET" class="form-control mono" value="{{ settings.DYNADOT_API_SECRET }}">
                </div>
            </div>
            <div class="checkbox-row" style="margin-bottom: 16px;">
                <input type="checkbox" name="DYNADOT_IT_CONTACT_CONFIRMED" id="dyn_contact" {% if settings.DYNADOT_IT_CONTACT_CONFIRMED %}checked{% endif %}>
                <label for="dyn_contact" style="margin-bottom: 0;">IT Contact Confirmed</label>
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Country Code</label>
                    <input type="text" name="DYNADOT_IT_CONTACT_COUNTRY_CODE" class="form-control mono" value="{{ settings.DYNADOT_IT_CONTACT_COUNTRY_CODE }}">
                </div>
                <div class="form-group">
                    <label>Province Code</label>
                    <input type="text" name="DYNADOT_IT_CONTACT_PROVINCE_CODE" class="form-control mono" value="{{ settings.DYNADOT_IT_CONTACT_PROVINCE_CODE }}">
                </div>
            </div>
        </div>

        <div style="background: var(--bg-color); padding: 24px; border-radius: var(--radius-md); border: 1px solid var(--card-border); margin-bottom: 24px;">
            <div class="flex items-center gap-2 mb-4">
                <i data-lucide="server" style="color: var(--text-muted);"></i>
                <h3 style="margin: 0; font-size: 1.1rem;">Openprovider</h3>
            </div>
            <div class="checkbox-row" style="margin-bottom: 16px; padding: 12px; background: rgba(255,255,255,0.02); border-radius: var(--radius-sm); border: 1px solid var(--card-border);">
                <input type="checkbox" name="OPENPROVIDER_ENABLED" id="op_enabled" {% if settings.OPENPROVIDER_ENABLED %}checked{% endif %}>
                <label for="op_enabled" style="margin-bottom: 0; font-weight: 600;">Abilita Openprovider</label>
            </div>
            <div class="form-group">
                <label>API Token</label>
                <input type="password" name="OPENPROVIDER_API_TOKEN" class="form-control mono" value="{{ settings.OPENPROVIDER_API_TOKEN }}">
            </div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Owner Handle</label>
                    <input type="text" name="OPENPROVIDER_OWNER_HANDLE" class="form-control mono" value="{{ settings.OPENPROVIDER_OWNER_HANDLE }}">
                </div>
                <div class="form-group">
                    <label>Admin Handle</label>
                    <input type="text" name="OPENPROVIDER_ADMIN_HANDLE" class="form-control mono" value="{{ settings.OPENPROVIDER_ADMIN_HANDLE }}">
                </div>
                <div class="form-group">
                    <label>Tech Handle</label>
                    <input type="text" name="OPENPROVIDER_TECH_HANDLE" class="form-control mono" value="{{ settings.OPENPROVIDER_TECH_HANDLE }}">
                </div>
                <div class="form-group">
                    <label>Billing Handle</label>
                    <input type="text" name="OPENPROVIDER_BILLING_HANDLE" class="form-control mono" value="{{ settings.OPENPROVIDER_BILLING_HANDLE }}">
                </div>
            </div>
            <div class="form-group">
                <label>Nameserver Group</label>
                <input type="text" name="OPENPROVIDER_NAMESERVER_GROUP" class="form-control mono" value="{{ settings.OPENPROVIDER_NAMESERVER_GROUP }}">
            </div>
            <div class="checkbox-row" style="margin-bottom: 16px;">
                <input type="checkbox" name="OPENPROVIDER_IT_CONTACTS_VERIFIED" id="op_contact" {% if settings.OPENPROVIDER_IT_CONTACTS_VERIFIED %}checked{% endif %}>
                <label for="op_contact" style="margin-bottom: 0;">IT Contacts Verified</label>
            </div>
            <div class="form-group">
                <label>Additional Data JSON</label>
                <textarea name="OPENPROVIDER_IT_ADDITIONAL_DATA_JSON" class="form-control mono" rows="4">{{ settings.OPENPROVIDER_IT_ADDITIONAL_DATA_JSON }}</textarea>
            </div>
        </div>

        <div style="background: var(--bg-color); padding: 24px; border-radius: var(--radius-md); border: 1px solid var(--card-border); margin-bottom: 24px;">
            <div class="flex items-center gap-2 mb-4">
                <i data-lucide="server" style="color: var(--text-muted);"></i>
                <h3 style="margin: 0; font-size: 1.1rem;">Gandi</h3>
            </div>
            <div class="checkbox-row" style="margin-bottom: 16px; padding: 12px; background: rgba(255,255,255,0.02); border-radius: var(--radius-sm); border: 1px solid var(--card-border);">
                <input type="checkbox" name="GANDI_ENABLED" id="gandi_enabled" {% if settings.GANDI_ENABLED %}checked{% endif %}>
                <label for="gandi_enabled" style="margin-bottom: 0; font-weight: 600;">Abilita Gandi</label>
            </div>
            <div class="form-group">
                <label>API Key (Personal Access Token)</label>
                <input type="password" name="GANDI_API_KEY" class="form-control mono" value="{{ settings.GANDI_API_KEY }}">
            </div>
            <div class="form-group">
                <label>Organization ID (Opzionale, usa Sharing-Id se presente)</label>
                <input type="text" name="GANDI_ORGANIZATION_ID" class="form-control mono" value="{{ settings.GANDI_ORGANIZATION_ID }}">
            </div>
            <div class="checkbox-row" style="margin-bottom: 0;">
                <input type="checkbox" name="GANDI_IT_CONTACT_CONFIRMED" id="gandi_contact" {% if settings.GANDI_IT_CONTACT_CONFIRMED %}checked{% endif %}>
                <label for="gandi_contact" style="margin-bottom: 0;">IT Contact Confirmed (Account verificato per .it)</label>
            </div>
        </div>

        <div style="margin-top: 32px; display: flex; flex-direction: column; align-items: center; border-top: 1px solid var(--card-border); padding-top: 24px;">
            <button type="submit" class="btn btn-primary" style="padding: 12px 32px; font-size: 1.1rem;">
                <i data-lucide="save"></i> Salva nel .env
            </button>
            <p style="margin-top: 16px; font-size: 0.85rem; color: var(--text-muted); display: flex; items-center; gap: 8px;">
                <i data-lucide="info" style="width: 16px; height: 16px;"></i>
                Nota: Potrebbe essere necessario riavviare l'app per applicare tutte le modifiche.
            </p>
        </div>
    </form>
</div>
{% endblock %}
